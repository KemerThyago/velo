# Workflow de Continuous Deployment
# Pipeline: Unit Tests → Build Preview → E2E Tests → Build & Deploy Production

name: Continuous Deployment

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: thyago-kemer-s-projects

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Unit Tests
        run: yarn test

  build-preview:
    name: Build and Deploy Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Pull Vercel Config (Preview)
        run: |
          yarn vercel pull --yes \
            --environment=preview \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_SCOPE

      - name: Inject Vercel Env to Vite
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL_PREVIEW }}" >> .vercel/.env.preview.local
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_PREVIEW }}" >> .vercel/.env.preview.local
          echo "VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}" >> .vercel/.env.preview.local
          cp .vercel/.env.preview.local .env

      - name: Build Preview
        run: yarn vercel build --token=$VERCEL_TOKEN
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_PREVIEW }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}

      - name: Deploy Preview
        id: deploy
        run: |
          set -euo pipefail
          RAW=$(yarn vercel deploy --prebuilt --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE --no-color 2>&1)
          echo "$RAW"
          URL=$(echo "$RAW" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "URL extraída: $URL"
          : "${URL:?Deployment URL está vazia — verifique o output do 'yarn vercel deploy'}"
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

      - name: Debug deployment URL
        run: echo "BASE_URL=${{ steps.deploy.outputs.deployment-url }}"

  prepare-db:
    name: Prepare Preview Database
    needs: [build-preview]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Database Migrations
        run: |
          DB_URL=$(echo "${{ secrets.DATABASE_URL_PREVIEW }}" | sed 's/:5432/:6543/')
          yarn supabase db push --db-url "$DB_URL" || true

      - name: Deploy Supabase Functions
        run: yarn supabase functions deploy --project-ref ${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  e2e-tests:
    name: E2E Tests
    needs: [prepare-db, build-preview]
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Validate deployment URL
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="${{ needs.build-preview.outputs.deployment-url }}"
          echo "BASE_URL=$BASE_URL"
          : "${BASE_URL:?Deployment URL está vazia — verifique o passo 'Deploy Preview'.}"
          curl --fail --max-redirs 0 -sI "$BASE_URL"

      - name: Debug Chromium
        run: |
          yarn playwright --version
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.goto('https://example.com');
            console.log('Title:', await page.title());
            await browser.close();
          })();
          "

      - name: Debug Vercel URL
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            page.on('response', r => console.log(r.status(), r.url()));
            await page.goto('${{ needs.build-preview.outputs.deployment-url }}', {timeout: 30000});
            console.log('Title:', await page.title());
            await browser.close();
          })();
          "

      - name: Run E2E Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-preview.outputs.deployment-url }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PREVIEW }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_PREVIEW }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PREVIEW }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report

      - name: Publish Testdino Report
        run: npx tdpw upload ./playwright-report --token=${{ secrets.TD_TOKEN }}

  build-production:
    name: Build and Deploy Production
    needs: [e2e-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Pull Vercel Config (Production)
        run: |
          yarn vercel pull --yes \
            --environment=production \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_SCOPE

      - name: Inject Vercel Env to Vite
        run: cp .vercel/.env.production.local .env

      - name: Build Production
        run: yarn vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy Production
        run: yarn vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE