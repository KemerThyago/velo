# Workflow de Continuous Deployment
# Pipeline: Unit Tests → Build Preview → E2E Tests → Build & Deploy Production

name: Continuous Deployment

on:
  push:
    branches:
      - main

env:
  # Versão do Node utilizada em todo o workflow
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: thyago-kemer-s-projects

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # 5. Executa os testes unitários com Vitest
      - name: Run Unit Tests
        run: yarn test

  build-preview:
    name: Build and Deploy Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js 
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # 5. Obter as configurações do Vercel (Preview)
      - name: Pull Vercel Config (Preview)
        run: |
          yarn vercel pull --yes \
            --environment=preview \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_SCOPE

      - name: Inject Vercel Env to Vite
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL_PREVIEW }}" >> .vercel/.env.preview.local
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_PREVIEW }}" >> .vercel/.env.preview.local
          echo "VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}" >> .vercel/.env.preview.local
          cp .vercel/.env.preview.local .env

      # 6. Build para o Vercel
      - name: Build Preview
        run: yarn vercel build --token=$VERCEL_TOKEN
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_PREVIEW }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}

      # 7. Exporta variáveis do preview e faz o build final
      - name: Export Preview Envs
        run: cat .vercel/.env.preview.local >> $GITHUB_ENV

      #8 
      - name: Check envs
        run: |
          echo "URL=$VITE_SUPABASE_URL"
          echo "KEY=${#VITE_SUPABASE_PUBLISHABLE_KEY}"

      # 9. Deploy preview no Vercel
      - name: Deploy Preview
        id: deploy
        run: |
          echo "=== RAW OUTPUT ==="
          RAW=$(yarn vercel deploy --prebuilt --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE)
          echo "$RAW"
          echo "=== FIM DO OUTPUT ==="
          URL=$(echo "$RAW" | grep -oE 'https://[a-zA-Z0-9-]+-[a-zA-Z0-9]+-[a-zA-Z0-9-]+\.vercel\.app' | tail -1)
          echo "URL extraída: $URL"
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

      - name: Debug deployment URL
        run: echo "BASE_URL=${{ steps.deploy.outputs.deployment-url }}"

  e2e-tests:
    name: E2E Tests
    needs: [build-preview]
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # 5. Instalação do Chromium
      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps chromium

      # 5.1 Execução das Migrations do banco de Preview
      - name: Run Database Migrations
        run: yarn supabase db push --db-url ${{ secrets.DATABASE_URL_PREVIEW }}

      # 5.2 Deploy das Edge Functions no banco de Preview
      - name: Deploy Supabase Functions
        run: yarn supabase functions deploy --project-ref ${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 6. Execução dos Testes E2E
      - name: Run E2E Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-preview.outputs.deployment-url }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PREVIEW }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_PREVIEW }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID_PREVIEW }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PREVIEW }}

      # 7. Relatório de Testes Automatizados
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report

      # 8. Publicar report JSON do TestDino
      - name: Publish Testdino Report
        if: ${{ !cancelled() }}
        run: npx tdpw upload ./playwright-report --token=${{ secrets.TD_TOKEN }}

  build-production:
    name: Build and Deploy Production
    needs: [e2e-tests]
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # 5. Obter as configurações do Vercel (Production)
      - name: Pull Vercel Config (Production)
        run: |
          yarn vercel pull --yes \
            --environment=production \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_SCOPE

      - name: Inject Vercel Env to Vite
        run: cp .vercel/.env.production.local .env

      # 6. Build para Produção
      - name: Build Production
        run: yarn vercel build --prod --token=$VERCEL_TOKEN

      # 7. Deploy de Produção
      - name: Deploy Production 
        run: yarn vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE